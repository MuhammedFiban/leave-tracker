<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassan Mohamed Almarzouqi Law Firm | HR Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Apple-like system font stack */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
        }
        .login-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }
        .btn-navy {
            background-color: #1E3A8A;
            transition: all 0.2s ease;
        }
        .btn-navy:hover {
            background-color: #1e2f6e;
            transform: scale(0.98);
        }
        .input-apple {
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            transition: all 0.2s ease;
        }
        .input-apple:focus {
            outline: none;
            border-color: #1E3A8A;
            box-shadow: 0 0 0 3px rgba(30,58,138,0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="login-card max-w-md w-full p-8">
        <div class="text-center mb-6">
            <div class="bg-navy/10 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-gavel text-3xl text-navy"></i>
            </div>
            <h1 class="text-2xl font-semibold text-gray-800">Hassan Mohamed Almarzouqi Law Firm</h1>
            <p class="text-gray-500 text-sm mt-1">HR Leave Management System</p>
        </div>
        <form method="POST" action="/login">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                <input type="email" name="username" required class="input-apple w-full px-4 py-2" placeholder="hr@almizan.qa">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="input-apple w-full px-4 py-2" placeholder="••••••">
            </div>
            <div class="text-right mb-4">
                <a href="/forgot-password" class="text-sm text-navy hover:underline">Forgot password?</a>
            </div>
            {% if error %}
                <div class="mb-4 p-3 bg-red-50 text-red-700 text-sm rounded-lg">{{ error }}</div>
            {% endif %}
            <button type="submit" class="btn-navy w-full text-white py-2 rounded-xl font-semibold transition">Sign in</button>
        </form>
        <p class="text-center text-xs text-gray-400 mt-6">Use your corporate email and the password provided by IT.</p>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .bg-navy\/10 { background-color: rgba(30,58,138,0.1); }
        .text-navy { color: #1E3A8A; }
    </style>
</body>
</html>
